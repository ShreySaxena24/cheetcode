version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cheetcode-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cheetcode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  python-scraper:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: cheetcode-scraper
    ports:
      - "8000:8000"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
    depends_on:
      - postgres

volumes:
  pgdata:
