spring.application.name=cheetcode

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/cheetcode
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Scheduler Configuration
# Enable/Disable Flags
scheduler.metadata-sync.enabled=true
scheduler.content-sync.enabled=true
scheduler.knowledge-ingest.enabled=true
scheduler.video-discovery.enabled=true

# Cron Expressions
scheduler.metadata-sync.cron=0 0 2 * * *
# Run every 10 seconds for easier testing in development
scheduler.content-sync.cron=*/10 * * * * *
# Run every 15 seconds for easier testing in development
scheduler.knowledge-ingest.cron=*/15 * * * * *
# Run every 10 seconds for easier testing in development
scheduler.video-discovery.cron=*/10 * * * * *

# Python Scraper Service URL
python.scraper.base-url=http://${SCRAPER_HOST:localhost}:8000
